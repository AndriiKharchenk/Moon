<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/style.css" />

    <title>Moon</title>
  </head>
  <body>
    <header></header>

    <main>
      <nav class="breadcrumbs" aria-label="breadcrumb">
        <div class="container">
          <ul class="breadcrumbs__list">
            <li class="breadcrumbs__item">
              <a class="breadcrumbs__link" href="/">Home /</a>
            </li>
            <li class="breadcrumb__item">
              <span>Shop</span>
            </li>
          </ul>
        </div>
      </nav>
      <section class="cart">
        <div class="container">
          <h2 class="cart__title">
            Cart
          </h2>
          <div class="cart__inner">
            <div class="cart__row cart__header">
              <div class="cart__delete">
                <img class="cart__icon-img" src="images/cart-icon.svg" alt="trash">
              </div>
              <div class="cart__photo">Photo</div>
              <div class="cart__product">Product</div>
              <div class="cart__price">Price</div>
              <div class="cart__quantity">Quantity</div>
              <div class="cart__subtotal">Subtotal</div>
            </div>
            <div class="cart__row cart__item">
              <div class="cart__delete">
                <button type="button">X</button>
              </div>
              <div class="cart__photo">
                <img class="cart__photo-img" src="images/cart1.jpg" alt="Porcelain Dinner Plate (27cm)">
              </div>
              <div class="cart__product">Porcelain Dinner Plate (27cm)</div>
              <div class="cart__price">$59</div>
              <div class="cart__quantity">
                <button class="qty__btn qty__btn--minus" type="button">-</button>
                <input class="cart__quantity-input" type="number" value="1" min="1">
                <button class="qty__btn qty__btn--plus" type="button">+</button>
              </div>
              <div class="cart__subtotal cart__subtotal-gold">$59</div>
            </div>
            <div class="cart__row cart__item">
              <div class="cart__delete">
                <button type="button">X</button>
              </div>
              <div class="cart__photo">
                <img class="cart__photo-img" src="images/cart2.jpg" alt="Ophelia Matte Natural  Vase">
              </div>
              <div class="cart__product">Ophelia Matte Natural  Vase</div>
              <div class="cart__price">$168</div>
              <div class="cart__quantity">
                <button class="qty__btn qty__btn--minus" type="button">-</button>
                <input class="cart__quantity-input" type="number" value="1" min="1">
                <button class="qty__btn qty__btn--plus" type="button">+</button>
              </div>
              <div class="cart__subtotal cart__subtotal-gold">$168</div>
            </div>
            <div class="cart__row cart__item">
              <div class="cart__delete">
                <button type="button">X</button>
              </div>
              <div class="cart__photo">
                <img class="cart__photo-img" src="images/cart3.jpg" alt="Porcelain Dinner Plate">
              </div>
              <div class="cart__product">Porcelain Dinner Plate</div>
              <div class="cart__price">$70</div>
              <div class="cart__quantity">
                <button class="qty__btn qty__btn--minus" type="button">-</button>
                <input class="cart__quantity-input" type="number" value="1" min="1">
                <button class="qty__btn qty__btn--plus" type="button">+</button>
              </div>
              <div class="cart__subtotal cart__subtotal-gold">$70</div>
            </div>
          </div>
          <div class="cart__total">
            <h3 class="cart__total-title">
              Total
            </h3>
            <div class="cart__total-price">
              <div class="total__item">
                <h4 class="total__item-title">Subtotal</h4>
                <p class="total__item-cost total__subtotal">$465.00</p>
              </div>
              <div class="total__item">
                <h4 class="total__item-title">Cart totals</h4>
                <p class="total__item-cost total__cart-total">$0.00</p>
              </div>
            </div>
            <a class="cart__total-btn" href="billing.html">Proceed to checkout</a>
          </div>
        </div>
      </section>
    </main>

    <footer></footer>

    <button type="button" class="btn__up" aria-label="scroll to top">
      <img class="btn__up-img" src="images/btnUp.svg" alt="Up" />
    </button>

    <script src="js/main.js"></script>
  </body>
</html>
